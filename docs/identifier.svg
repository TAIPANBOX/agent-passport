<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"><defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0a0e16"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#2dd4bf"/><stop offset="0.5" stop-color="#4493f8"/><stop offset="1" stop-color="#2dd4bf"/>
  </linearGradient>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161d27" stroke-width="1"/>
  </pattern>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
  <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2dd4bf" flood-opacity="0.5"/>
  </filter>
</defs><rect x="0" y="0" width="1280" height="720" rx="0" ry="0" fill="url(#bg)"/><rect x="0" y="0" width="1280" height="720" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/><text x="1252" y="698" font-size="12.5" fill="#69788b" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="end">github.com/TAIPANBOX/agent-passport</text><text x="40" y="56" font-size="28" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">agent:// identifier</text><text x="40" y="84" font-size="15" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">The canonical agent identity: a URI, treated as an opaque key by every consumer.</text><line x1="40" y1="100" x2="1240" y2="100" stroke="#222b38" stroke-width="1"/><text x="40" y="122" font-size="12" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">ANATOMY OF agent://</text><text x="291.7" y="178" font-size="27" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start"><tspan fill="#2dd4bf">agent</tspan><tspan fill="#9aa7b8">://</tspan><tspan fill="#4493f8">acme-bank.example</tspan><tspan fill="#9aa7b8">/</tspan><tspan fill="#3fb950">support/tier1-bot</tspan></text><line x1="332.2" y1="190" x2="332.2" y2="210" stroke="#2dd4bf" stroke-width="1.6" opacity="0.75"/><circle cx="332.2" cy="190" r="3" fill="#2dd4bf"/><text x="332.2" y="226" font-size="12.5" fill="#2dd4bf" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="middle">scheme</text><line x1="559.0" y1="190" x2="559.0" y2="210" stroke="#4493f8" s