-anchor="start">identity from a user:// principal.</text><rect x="450.0" y="250" width="380" height="130" rx="0" ry="0" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="450.0" y="250" width="6" height="130" rx="3" ry="3" fill="#4493f8" stroke="#283341" stroke-width="1"/><text x="474.0" y="284" font-size="17" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">trust-domain</text><text x="810.0" y="280" font-size="10" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="end" letter-spacing="1.5">SEGMENT</text><line x1="474.0" y1="296" x2="810.0" y2="296" stroke="#222b38" stroke-width="1"/><text x="474.0" y="320" font-size="13.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">acme-bank.example</text><text x="474.0" y="346" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">DNS name the operating org controls.</text><text x="474.0" y="364" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Lowercase only.</text><rect x="850.0" y="250" width="380" height="130" rx="0" ry="0" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="850.0" y="250" width="6" height="130" rx="3" ry="3" fill="#3fb950" stroke="#283341" stroke-width="1"/><text x="874.0" y="284" font-size="17" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">path</text><text x="1210.0" y="280" font-size="10" fill="#3fb950" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="end" letter-spacing="1.5">SEGMENT</text><line x1="874.0" y1="296" x2="1210.0" y2="296" stroke="#222b38" stroke-width="1"/><text x="874.0" y="320" font-size="13.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="600" text-anchor="start">support/tier1-bot</text><text x="874.0" y="346" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">Segments naming the agent within the</text><text x="874.0" y="364" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">org, e.g. eng/ci-fixer/instance-7.</text><rect x="50.0" y="402" width="580" height="108" rx="0" ry="0" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="50.0" y="402" width="6" height="108" rx="3" ry="3" fill="#e3b341" stroke="#283341" stroke-width="1"/><text x="74.0" y="432" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Constraints</text><text x="610.0" y="432" font-size="10" fill="#e3b341" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="end" letter-spacing="1.5">RULES</text><line x1="74.0" y1="446" x2="610.0" y2="446" stroke="#222b38" stroke-width="1"/><text x="74.0" y="468" font-size="12.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">chars per segment: [a-z0-9._-]  ·  max length: 255 bytes</text><text x="74.0" y="490" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">opaque key: products MUST NOT require parsing for correctness</text><rect x="650.0" y="402" width="580" height="108" rx="0" ry="0" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="650.0" y="402" width="6" height="108" rx="3" ry="3" fill="#4493f8" stroke="#283341" stroke-width="1"/><text x="674.0" y="432" font-size="16" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">SPIFFE-aligned</text><text x="1210.0" y="432" font-size="10" fill="#4493f8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="end" letter-spacing="1.5">MAPPING</text><line x1="674.0" y1="446" x2="1210.0" y2="446" stroke="#222b38" stroke-width="1"/><text x="674.0" y="468" font-size="11.5" fill="#e6edf3" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">agent://acme-bank.example/support/tier1-bot</text><text x="674.0" y="490" font-size="11.5" fill="#9aa7b8" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="400" text-anchor="start">spiffe://acme-bank.example/agent/support/tier1-bot</text><text x="40" y="548" font-size="12" fill="#3fb950" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start" letter-spacing="1.5">THE user:// FORM (delegation chains)</text><text x="424.0" y="588" font-size="24" font-family="'SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'Liberation Mono',monospace" font-weight="700" text-anchor="start"><tspan fill="#3fb950">user</tspan><tspan fill="#9aa7b8">://</tspan><tspan fill="#4493f8">acme-bank.example</tspan><tspan fill="#9aa7b8">/</tspan><tspan fill="#e6edf3">j.doe</tspan></text><rect x="50.0" y="606" width="580" height="76" rx="0" ry="0" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="50.0" y="606" width="6" height="76" rx="3" ry="3" fill="#3fb950" stroke="#283341" stroke-width="1"/><text x="74.0" y="634" font-size="14.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Grammar</text><text x="74.0" y="656" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">symmetric with agent:// : same trust-domain and subject rules</text><rect x="650.0" y="606" width="580" height="76" rx="0" ry="0" fill="#1b2331" stroke="#222b38" stroke-width="1" filter="url(#soft)"/><rect x="650.0" y="606" width="6" height="76" rx="3" ry="3" fill="#3fb950" stroke="#283341" stroke-width="1"/><text x="674.0" y="634" font-size="14.5" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" text-anchor="start">Used in</text><text x="674.0" y="656" font-size="11.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="start">on_behalf_of delegation chains: root-first, humans and agents mixed</text></svg>