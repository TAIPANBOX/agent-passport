ation Mono',monospace" font-weight="400" text-anchor="start">schema, ts, source, type, agent_id (+ prev_hash)</text><text x="640" y="606" font-size="15" fill="#e6edf3" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" text-anchor="middle">One identifier, one Passport document, one event envelope.</text><text x="640" y="628" font-size="12.5" fill="#9aa7b8" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="400" text-anchor="middle">Every service in the stack conforms to the same contract, so their events correlate for free.</text></svg>